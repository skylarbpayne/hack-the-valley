name = "hack-the-valley"
main = "./worker.js"
compatibility_date = "2026-02-17"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/events/*"]

# Reconcile blog email-blast send-log rows against Resend's real broadcast
# status (scheduled -> sending -> sent/canceled). See worker.js `scheduled`.
[triggers]
crons = ["*/15 * * * *"]

[vars]
MAX_UPLOAD_MB = "100"

[[d1_databases]]
binding = "HTV_DB"
database_name = "hack-the-valley"
database_id = "${HTV_D1_DATABASE_ID}"

[[r2_buckets]]
binding = "SUBMISSIONS_MEDIA"
bucket_name = "hack-the-valley-submission-media"
