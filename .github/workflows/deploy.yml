name: Deploy Hack the Valley Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hack-the-valley-production
  cancel-in-progress: false

jobs:
  test-migrate-deploy:
    name: Test, migrate D1, deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Syntax check
        run: npm run check

      - name: Detect deploy secrets
        id: deploy_secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets."
          fi

      - name: Backup production D1 before migrations
        if: steps.deploy_secrets.outputs.available == 'true'
        run: ./scripts/backup-production-d1.sh

      - name: Upload production D1 backup artifact
        if: steps.deploy_secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: htv-d1-backup-${{ github.sha }}
          path: artifacts/d1-backups/
          retention-days: 30
          if-no-files-found: error

      - name: Ensure app D1 database and apply migrations
        if: steps.deploy_secrets.outputs.available == 'true'
        run: ./scripts/setup-hack-the-valley-d1.sh

      - name: Deploy Worker + Assets
        if: steps.deploy_secrets.outputs.available == 'true'
        run: npm run deploy:ci
