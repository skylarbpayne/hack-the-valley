<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Admin | Hack the Valley 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>body { font-family: Inter, sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-8">
      <div>
        <p class="uppercase tracking-widest text-sm text-cyan-400 font-semibold mb-2">Hack the Valley</p>
        <h1 class="text-4xl font-black">Submission Admin</h1>
        <p class="text-slate-400 mt-2">Private review table for project submissions and uploaded media.</p>
      </div>
      <a href="/projects/" class="text-cyan-300 hover:text-cyan-200">Open projects page</a>
    </div>

    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 mb-6">
      <label class="block font-bold mb-2">Admin token</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="token" class="flex-1 rounded-xl bg-slate-950 border border-slate-700 px-4 py-3" type="password" placeholder="HTV_ADMIN_TOKEN">
        <button id="load" class="rounded-xl bg-cyan-400 text-slate-950 font-black px-6 py-3">Load submissions</button>
        <a id="csv" class="hidden rounded-xl border border-cyan-400 text-cyan-300 font-bold px-6 py-3 text-center" href="#">Download CSV</a>
      </div>
      <p id="status" class="text-slate-400 text-sm mt-3"></p>
    </section>

    <section id="submissions" class="space-y-4"></section>
  </main>

  <script src="/admin-submissions.js"></script>
</body>
</html>
