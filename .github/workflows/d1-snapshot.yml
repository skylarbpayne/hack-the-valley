name: Snapshot production D1

on:
  schedule:
    # Daily at 09:17 UTC / 02:17 Pacific during PDT. Keep this off the top of the hour.
    - cron: "17 9 * * *"
  workflow_dispatch:

concurrency:
  group: hack-the-valley-d1-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    name: Backup production D1
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect snapshot secrets
        id: snapshot_secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping snapshot: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets."
          fi

      - name: Backup production D1
        if: steps.snapshot_secrets.outputs.available == 'true'
        run: ./scripts/backup-production-d1.sh

      - name: Upload production D1 snapshot artifact
        if: steps.snapshot_secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: htv-d1-snapshot-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/d1-backups/
          retention-days: 30
          if-no-files-found: error
